        - anthday-bea-firr
        - anthday-bea-noirr
        - matyday-bea-firr
        - matyday-bea-noirr
        - plantday-bea-firr
        - plantday-bea-noirr
        - plantyear-bea-firr
        - plantyear-bea-noirr
        - harvyear-bea-firr
        - harvyear-bea-noirr
