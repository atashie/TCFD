  # -------------------------
  # cotton searches
  # -------------------------
  cotton:
    last_searched: "2026-01-20"
    notes: "Crop code 'cot'. Only available in ISIMIP2a (historical). No future projections in ISIMIP3b."

    isimip2a:
      total_datasets: 63
      sectors: ["agriculture"]
      impact_models: ["CLM-Crop"]
      climate_forcings: ["WATCH-WFDEI"]
      bias_adjustment: ["nobc"]
      scenarios:
        climate: ["hist"]
        soc: ["co2"]
      temporal:
        resolution: "annual"
        period: "1980-2012"
      spatial:
        resolution: "0.5 degree"
        coverage: "global"
      variables_available:
        - yield-cot-firr-{default,fullharm,harmnon}
        - yield-cot-noirr-{default,fullharm,harmnon}
        - biom-cot-firr-{default,fullharm,harmnon}
        - biom-cot-noirr-{default,fullharm,harmnon}
        - aet-cot-{firr,noirr}-{default,fullharm,harmnon}
        - gsprcp-cot-{firr,noirr}-{default,fullharm,harmnon}
        - gsrsds-cot-{firr,noirr}-{default,fullharm,harmnon}
        - sumt-cot-{firr,noirr}-{default,fullharm,harmnon}
        - plantday-cot-{firr,noirr}-{default,fullharm,harmnon}
        - matyday-cot-{firr,noirr}-{default,fullharm,harmnon}
        - initr-cot-{firr,noirr}-{default,fullharm,harmnon}
        - leach-cot-{firr,noirr}-{default,fullharm,harmnon}
        - pirrww-cot-firr-{default,fullharm,harmnon}
      notes: |
        Historical data only (1980-2012). No future projections available.
        CLM-Crop is the ONLY model with cotton in ISIMIP.
        Harmonization variants: default (recommended), fullharm, harmnon.
        Irrigation: firr (fully irrigated), noirr (rainfed).

    isimip3a:
      total_datasets: 2
      type: "InputData (crop calendars only, not simulation outputs)"
      files:
        - ggcmi-crop-calendar-phase3_2015soc_cot_firr.nc
        - ggcmi-crop-calendar-phase3_2015soc_cot_noirr.nc
      notes: "Crop calendar inputs for cotton planting/harvest timing. Not yield data."

    isimip3b:
      total_datasets: 0
      notes: "Cotton NOT simulated in ISIMIP3b. No future projections available."

