    isimip2a:
      total_datasets: ~90
      sectors: ["agriculture"]
      impact_models: ["CGMS-WOFOST", "LPJ-GUESS"]
      climate_forcings: ["WATCH-WFDEI", "GSWP3", "Princeton"]
      bias_adjustment: ["nobc"]
      scenarios:
        climate: ["hist"]
        soc: ["co2"]
      temporal:
        resolution: "annual"
        period: "1971-2012"
      spatial:
        resolution: "0.5 degree"
        coverage: "global"
      variables_available:
        - yield-ben-firr-default
        - yield-ben-noirr-default
        - biom-ben-firr-default
        - biom-ben-noirr-default
        - anthday-ben-firr-default
        - anthday-ben-noirr-default
